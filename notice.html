<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회 탐구 한마당 — 사회를 읽고, 법을 쓰다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Black+Han+Sans&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0f4f8;
    color: #1a202c;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
  }

  /* 헤더 */
  .header {
    background: #1a3a5c;
    border-radius: 20px;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -20px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .tag {
    display: inline-block;
    background: rgba(99,179,237,0.25);
    color: #90cdf4;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }
  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    color: #fff;
    line-height: 1.3;
    margin-bottom: 0.5rem;
    position: relative;
    z-index: 1;
  }
  .header h1 span {
    color: #63b3ed;
  }
  .header .sub {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    position: relative;
    z-index: 1;
  }

  /* 요약 카드 */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .summary-card {
    background: #fff;
    border-radius: 14px;
    padding: 1rem 1.1rem;
    border: 1px solid #e2e8f0;
  }
  .summary-card .label {
    font-size: 11px;
    color: #718096;
    font-weight: 500;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .summary-card .value {
    font-size: 14px;
    font-weight: 700;
    color: #1a202c;
    line-height: 1.4;
  }
  .summary-card.accent {
    background: #ebf8ff;
    border-color: #bee3f8;
  }
  .summary-card.accent .value { color: #2b6cb0; }

  /* 섹션 */
  .section {
    background: #fff;
    border-radius: 16px;
    padding: 1.5rem 1.5rem;
    margin-bottom: 1.2rem;
    border: 1px solid #e2e8f0;
  }
  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 1rem;
    padding-bottom: 0.7rem;
    border-bottom: 2px solid #ebf8ff;
  }
  .section-title .icon {
    width: 28px; height: 28px;
    background: #ebf8ff;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  /* 스텝 */
  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .step-num {
    flex-shrink: 0;
    width: 28px; height: 28px;
    background: #1a3a5c;
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .step-body { flex: 1; }
  .step-title {
    font-size: 14px;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 3px;
  }
  .step-desc {
    font-size: 13px;
    color: #718096;
    line-height: 1.6;
  }
  .step-arrow {
    text-align: center;
    color: #cbd5e0;
    font-size: 18px;
    margin: -4px 0 -4px 14px;
  }

  /* 필수항목 */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .item-card {
    background: #f7fafc;
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    border: 1px solid #e2e8f0;
  }
  .item-num {
    font-size: 10px;
    font-weight: 700;
    color: #4299e1;
    margin-bottom: 2px;
  }
  .item-name {
    font-size: 13px;
    font-weight: 700;
    color: #2d3748;
    margin-bottom: 2px;
  }
  .item-hint {
    font-size: 11px;
    color: #a0aec0;
    line-height: 1.4;
  }

  /* 후속활동 */
  .follow-up {
    background: linear-gradient(135deg, #1a3a5c 0%, #2a5080 100%);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    color: #fff;
  }
  .follow-up .fu-title {
    font-size: 14px;
    font-weight: 700;
    color: #90cdf4;
    margin-bottom: 0.4rem;
  }
  .follow-up .fu-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    line-height: 1.7;
    margin-bottom: 1rem;
  }
  .fu-steps {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .fu-step {
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: #e2e8f0;
    font-weight: 500;
  }
  .fu-step span { color: #63b3ed; font-weight: 700; margin-right: 4px; }

  /* 시상 */
  .award-banner {
    background: #fffbeb;
    border: 1.5px solid #f6d860;
    border-radius: 14px;
    padding: 1rem 1.3rem;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.2rem;
  }
  .award-icon {
    font-size: 28px;
    flex-shrink: 0;
  }
  .award-text .t1 {
    font-size: 14px;
    font-weight: 700;
    color: #744210;
  }
  .award-text .t2 {
    font-size: 12px;
    color: #975a16;
    margin-top: 2px;
  }
